name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # annotated tag objects, so the tag message is readable below

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release JAR
        run: ./gradlew shadowJar
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      # The annotated tag's message body becomes the release notes, so the
      # summary is written once — when tagging — instead of by hand afterwards.
      - name: Extract tag message
        run: git tag -l --format='%(contents:body)' "$GITHUB_REF_NAME" > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          generate_release_notes: true   # appended below the tag message
          files: build/libs/carve-*.jar
