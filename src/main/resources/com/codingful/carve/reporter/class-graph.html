<!DOCTYPE html>
{{META}}
<html lang="en">
<head>
<meta charset="UTF-8">
<title>carve — class graph</title>
<style>
  html,body { margin:0; height:100%; background:#0d1117; color:#e6edf3;
              font-family:-apple-system,Helvetica,Arial,sans-serif; overflow:hidden; }
  #graph { position:absolute; inset:0; }
  #panel { position:absolute; top:12px; left:12px; z-index:10; background:rgba(22,27,34,.92);
           border:1px solid #484f58; border-radius:8px; padding:12px 14px; max-width:260px;
           font-size:13px; display:flex; flex-direction:column;
           max-height:calc(100vh - 48px); overflow-y:auto;
           backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
           box-shadow:0 8px 32px rgba(0,0,0,.55); }
  #panel h1 { font-size:14px; margin:0 0 8px; cursor:grab; user-select:none; flex-shrink:0; }
  #panel h1:active { cursor:grabbing; }
  #panel label { display:block; margin:3px 0; cursor:pointer; }
  #panel .sec { margin-top:10px; border-top:1px solid #30363d; padding-top:8px; flex-shrink:0; }
  #projects { overflow-y:auto; overflow-x:hidden; max-height:32vh; padding-right:4px;
              scrollbar-width:thin; scrollbar-color:#484f58 transparent; }
  #projects::-webkit-scrollbar { width:6px; }
  #projects::-webkit-scrollbar-thumb { background:#484f58; border-radius:3px; }
  #search { width:100%; box-sizing:border-box; background:#0d1117; color:#e6edf3;
            border:1px solid #30363d; border-radius:5px; padding:5px; margin-top:4px; }
  #search-suggestions { position:fixed; z-index:100; background:#161b22; border:1px solid #484f58;
            border-radius:6px;
            box-shadow:0 6px 20px rgba(0,0,0,.6); display:none; }
  #search-suggestions div { padding:6px 10px; cursor:pointer; font-size:12px;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #search-suggestions div:hover, #search-suggestions div.active { background:#2d333b; }
  #search-suggestions .pkg-hint { color:#8b949e; font-size:11px; }
  .dot { display:inline-block; width:11px; height:11px; border-radius:50%;
         margin-right:6px; vertical-align:middle; flex-shrink:0; }
  .muted { color:#8b949e; font-size:11px; }
  #node-detail table { width:100%; border-collapse:collapse; margin-top:6px; font-size:12px; }
  #node-detail td { padding:2px 0; vertical-align:top; }
  #node-detail td:first-child { color:#8b949e; width:78px; }
  #node-detail td:last-child { word-break:break-all; }
  #node-detail .class-name { font-weight:bold; word-break:break-all; margin-bottom:6px;
                              font-size:12px; line-height:1.4; }
  #loading { position:fixed; inset:0; z-index:999; background:#0d1117;
             display:flex; flex-direction:column; align-items:center; justify-content:center;
             gap:16px; pointer-events:none; transition:opacity .4s; }
  #loading.hidden { opacity:0; }
  .spinner { width:36px; height:36px; border:3px solid #30363d;
             border-top-color:#58a6ff; border-radius:50%;
             animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loading-msg { color:#8b949e; font-size:13px; }
  #report-footer { position:fixed; left:0; right:0; bottom:0; z-index:5;
             background:rgba(13,17,23,.8); color:#6e7681; font-size:10px; line-height:1.6;
             padding:3px 10px; pointer-events:none;
             backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); }
  #report-footer a { color:#6e7681; pointer-events:auto; }
  #report-footer .disclaimer { cursor:help; text-decoration:underline dotted; pointer-events:auto; }
  #report-title { position:fixed; top:10px; left:0; right:0; z-index:4; text-align:center;
             color:#6e7681; font-size:11px; letter-spacing:.14em; text-transform:uppercase;
             pointer-events:none; user-select:none; }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <div id="loading-msg">Building graph…</div>
</div>
<div id="graph"></div>
<div id="report-title"></div>
<div id="panel">
  <h1 title="Drag to move">⠿ Class graph</h1>
  <div id="stats" class="muted"></div>
  <div class="sec" id="projects"></div>
  <div class="sec">
    <label><input type="checkbox" id="onlyRisk"> Only risk classes</label>
    <label><input type="checkbox" id="onlyLockRisk"> Only lock risk classes</label>
    <label><input type="checkbox" id="hlRisk" checked> Highlight risks (red)</label>
  </div>
  <div class="sec">
    <label><input type="checkbox" id="groupPkg"> Group by package</label>
  </div>
  <div class="sec" style="position:relative">
    <input id="search" placeholder="Search class…" autocomplete="off">
    <div id="search-suggestions"></div>
  </div>
  <div class="sec legend" id="legend"></div>
  <div class="sec" id="node-info" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <b>Selected class</b>
      <span id="node-clear" style="cursor:pointer;color:#8b949e;font-size:15px"
            title="Clear selection">✕</span>
    </div>
    <div id="node-detail"></div>
  </div>
</div>
<div id="report-footer"></div>
<script src="https://unpkg.com/3d-force-graph"></script>
<script>
const DATA = {{DATA}};
if (DATA.meta) {
  const m = DATA.meta;
  document.getElementById('report-title').textContent = `${m.generatedBy} v${m.version}`;
  document.getElementById('report-footer').innerHTML =
    `Generated by <a href="${m.toolRepository}" target="_blank" rel="noopener">${m.generatedBy}</a> `
    + `v${m.version} on ${m.generatedOn} &middot; `
    + `${m.generatedBy} is ${m.toolCopyright}, <a href="${m.toolLicenseUrl}" target="_blank" rel="noopener">${m.toolLicense}</a> &middot; `
    + `<span class="disclaimer" title="${m.disclaimer.replace(/"/g, '&quot;')}">No warranty — hover for details</span>`;
}
// Distinct, colourblind-friendly palette (no red — red is reserved for risk highlight).
const PALETTE = ['#56b4e9','#e69f00','#009e73','#cc79a7','#0072b2','#f0e442','#d55e00','#999999'];
const projColor = {};
[...new Set(DATA.nodes.map(n => n.project))].sort()
  .forEach((p, i) => projColor[p] = PALETTE[i % PALETTE.length]);

function roleColor(n) {
  if (n.transactional && n.external) return '#ff8c00';
  if (n.transactional) return '#f0dc50';
  if (n.external) return '#f06464';
  return '#9ab4dc';
}
function pkgOf(n) {
  const i = n.id.lastIndexOf('.');
  return i < 0 ? '(default)' : n.id.substring(0, i);
}
function pkgColor(p) {
  let h = 0;
  for (let i = 0; i < p.length; i++) h = (h * 31 + p.charCodeAt(i)) % 360;
  return `hsl(${h},62%,62%)`;
}
let groupByPkg = false;
function baseColor(n) {
  if (groupByPkg) return pkgColor(pkgOf(n));
  return DATA.multiProject ? (projColor[n.project] || '#9ab4dc') : roleColor(n);
}

// ---- selection state ---------------------------------------------
let selectedNode = null;
let dblTimer = null;

function nodeColor(n) {
  if (n === selectedNode) return '#ffffff';
  if (document.getElementById('hlRisk').checked && (n.inRisk || n.external)) return '#ff3b3b';
  return baseColor(n);
}
function nodeVal(n) {
  const base = 1 + Math.min(n.methods, 40) * 0.4;
  return n === selectedNode ? base * 2.5 : base;
}
function flyTo(node) {
  const d = 120;
  const r = 1 + (node.x*node.x + node.y*node.y + node.z*node.z) ** 0.5;
  Graph.cameraPosition(
    { x: node.x*(1+d/r), y: node.y*(1+d/r), z: node.z*(1+d/r) }, node, 800);
}

const elGraph = document.getElementById('graph');
const Graph = ForceGraph3D()(elGraph)
  .backgroundColor('#0d1117')
  .nodeLabel(n => `<div style="background:#161b22;padding:4px 8px;border-radius:4px;border:1px solid #30363d">
      <b>${n.label}</b><br><span style="color:#8b949e">${pkgOf(n)}${DATA.multiProject?' · '+(n.project||'—'):''}</span><br>
      methods: ${n.methods}${n.transactional?' · @Transactional':''}${n.external?' · '+n.externalCalls.join(','):''}${n.cyclic?' · cyclic':''}${n.inRisk?' · risk':''}${n.inLockRisk?' · lock risk':''}</div>`)
  .nodeColor(nodeColor)
  .nodeRelSize(3)
  .nodeVal(nodeVal)
  .nodeOpacity(0.85)
  .linkColor(() => 'rgba(188,198,212,0.40)')
  .linkOpacity(0.4)
  .linkWidth(l => Math.min(0.6 + l.weight * 0.2, 4))
  .linkDirectionalArrowLength(3)
  .linkDirectionalArrowRelPos(1)
  .linkDirectionalArrowColor(() => 'rgba(210,218,228,0.6)')
  .linkDirectionalParticles(l => Math.min(l.weight, 4))
  .linkDirectionalParticleWidth(1.5)
  .linkDirectionalParticleColor(() => '#d7dee8')
  .linkDirectionalParticleSpeed(0.006)
  .warmupTicks(150)
  .cooldownTicks(200)
  .onEngineStop(() => {
    const el = document.getElementById('loading');
    if (el) { el.classList.add('hidden'); setTimeout(() => el.remove(), 450); }
  })
  .onNodeClick(node => {
    selectedNode = node;
    Graph.nodeColor(nodeColor).nodeVal(nodeVal);
    showNodeDetail(node);
    if (dblTimer !== null) {
      clearTimeout(dblTimer);
      dblTimer = null;
      flyTo(node);
    } else {
      dblTimer = setTimeout(() => { dblTimer = null; }, 280);
    }
  });

// Keep the library's built-in "left-click: rotate…" hint clear of our footer bar.
function positionNavInfoAboveFooter() {
  const nav = elGraph.querySelector('.scene-nav-info');
  const footer = document.getElementById('report-footer');
  if (nav && footer) nav.style.bottom = (footer.getBoundingClientRect().height + 6) + 'px';
}
positionNavInfoAboveFooter();
window.addEventListener('resize', positionNavInfoAboveFooter);

// ---- package clustering layout -----------------------------------
// One focal point per package. Positions are computed by a mini spring
// layout so that packages with many inter-package edges end up closer
// together, reducing arc crossings when "Group by package" is on.
const allPkgs = [...new Set(DATA.nodes.map(pkgOf))].sort();
const FOCI = (() => {
  const N   = allPkgs.length;
  const R   = 55 * Math.sqrt(Math.max(1, N));
  const pos = {};

  // Seed positions from a Fibonacci sphere for even initial spread.
  allPkgs.forEach((p, i) => {
    const y    = 1 - (i + 0.5) / N * 2;
    const ring = Math.sqrt(Math.max(0, 1 - y * y));
    const th   = Math.PI * (1 + Math.sqrt(5)) * i;
    pos[p] = { x: R * Math.cos(th) * ring, y: R * y, z: R * Math.sin(th) * ring };
  });

  // Aggregate class-level edges to package-level weights.
  const pkgOfId = id => { const i = id.lastIndexOf('.'); return i < 0 ? '(default)' : id.substring(0, i); };
  const pkgW = {};
  DATA.links.forEach(l => {
    const sp = pkgOfId(typeof l.source === 'object' ? l.source.id : l.source);
    const tp = pkgOfId(typeof l.target === 'object' ? l.target.id : l.target);
    if (sp === tp) return;
    const key = sp < tp ? sp + '|' + tp : tp + '|' + sp;
    pkgW[key] = (pkgW[key] || 0) + (l.weight || 1);
  });

  // Spring iterations: connected packages attract, all pairs repel.
  const maxW    = Math.max(1, ...Object.values(pkgW));
  const REPULSE = R * R * 1.2;
  const ITERS   = 150;
  for (let iter = 0; iter < ITERS; iter++) {
    const alpha = Math.pow(1 - iter / ITERS, 1.5);
    const f = {};
    allPkgs.forEach(p => { f[p] = { x: 0, y: 0, z: 0 }; });

    // Repulsion — all pairs
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const a = allPkgs[i], b = allPkgs[j];
        const dx = pos[b].x - pos[a].x, dy = pos[b].y - pos[a].y, dz = pos[b].z - pos[a].z;
        const k  = REPULSE / (dx*dx + dy*dy + dz*dz + 1);
        f[a].x -= k*dx; f[a].y -= k*dy; f[a].z -= k*dz;
        f[b].x += k*dx; f[b].y += k*dy; f[b].z += k*dz;
      }
    }

    // Attraction — inter-package edges, proportional to weight
    Object.entries(pkgW).forEach(([key, w]) => {
      const sep = key.indexOf('|');
      const a = key.substring(0, sep), b = key.substring(sep + 1);
      const dx = pos[b].x - pos[a].x, dy = pos[b].y - pos[a].y, dz = pos[b].z - pos[a].z;
      const d  = Math.sqrt(dx*dx + dy*dy + dz*dz) + 1;
      const k  = (w / maxW) * R * 0.08;
      f[a].x += k*dx/d; f[a].y += k*dy/d; f[a].z += k*dz/d;
      f[b].x -= k*dx/d; f[b].y -= k*dy/d; f[b].z -= k*dz/d;
    });

    allPkgs.forEach(p => {
      pos[p].x += f[p].x * alpha;
      pos[p].y += f[p].y * alpha;
      pos[p].z += f[p].z * alpha;
    });
  }

  // Renormalize to sphere of radius R so spread is predictable regardless of N.
  const maxD = Math.sqrt(Math.max(1, ...allPkgs.map(p => pos[p].x**2 + pos[p].y**2 + pos[p].z**2)));
  allPkgs.forEach(p => { pos[p].x = pos[p].x/maxD*R; pos[p].y = pos[p].y/maxD*R; pos[p].z = pos[p].z/maxD*R; });

  return pos;
})();
function clusterForce() {
  let nodes = [];
  function force(alpha) {
    if (!groupByPkg) return;
    const k = alpha * 0.55;
    for (const n of nodes) {
      const f = FOCI[pkgOf(n)];
      if (!f) continue;
      n.vx += (f.x - n.x) * k;
      n.vy += (f.y - n.y) * k;
      n.vz += (f.z - n.z) * k;
    }
  }
  force.initialize = _ => { nodes = _; };
  return force;
}
Graph.d3Force('cluster', clusterForce());

// The link force pulls connected classes together regardless of package;
// on a dense graph it would overpower the clustering. When grouping is on
// we weaken links (and slightly soften charge) so package cohesion wins.
const linkForce = Graph.d3Force('link');
const chargeForce = Graph.d3Force('charge');
const defLinkStrength = linkForce.strength();
const defChargeStrength = chargeForce.strength();
function applyLayoutForces() {
  if (groupByPkg) {
    linkForce.strength(0.04);
    chargeForce.strength(-18);
  } else {
    linkForce.strength(defLinkStrength);
    chargeForce.strength(defChargeStrength);
  }
}

// ---- filtering ---------------------------------------------------
const projects = [...new Set(DATA.nodes.map(n => n.project))].sort();
const active = new Set(projects);
const projDiv = document.getElementById('projects');
if (DATA.multiProject) {
  projDiv.innerHTML = '<b>Projects</b>';
  const projCheckboxes = [];
  const allId = 'p_all';
  projDiv.insertAdjacentHTML('beforeend',
    `<label style="display:flex;align-items:center;gap:4px;font-weight:bold">
       <input type="checkbox" id="${allId}" checked>All / none
     </label>`);
  const allCb = document.getElementById(allId);
  allCb.addEventListener('change', e => {
    active.clear();
    projCheckboxes.forEach(cb => {
      cb.checked = e.target.checked;
      if (e.target.checked) active.add(cb.dataset.project);
    });
    apply();
  });
  projects.forEach(p => {
    const id = 'p_' + p;
    const color = projColor[p] || '#9ab4dc';
    projDiv.insertAdjacentHTML('beforeend',
      `<label style="display:flex;align-items:center;gap:4px">
         <input type="checkbox" id="${id}" checked>
         <span class="dot" style="background:${color}"></span>${p||'(none)'}
       </label>`);
    const cb = document.getElementById(id);
    cb.dataset.project = p;
    projCheckboxes.push(cb);
    cb.addEventListener('change', e => {
      if (e.target.checked) active.add(p); else active.delete(p);
      allCb.checked = projCheckboxes.every(c => c.checked);
      apply();
    });
  });
} else {
  projDiv.style.display = 'none';
}

function apply() {
  const onlyRisk     = document.getElementById('onlyRisk').checked;
  const onlyLockRisk = document.getElementById('onlyLockRisk').checked;
  const nodes = DATA.nodes.filter(n =>
    active.has(n.project) &&
    (!onlyRisk     || n.inRisk || n.external) &&
    (!onlyLockRisk || n.inLockRisk));
  const ids = new Set(nodes.map(n => n.id));
  const links = DATA.links.filter(l =>
    ids.has(typeof l.source==='object'?l.source.id:l.source) &&
    ids.has(typeof l.target==='object'?l.target.id:l.target));
  Graph.graphData({ nodes, links });
  document.getElementById('stats').textContent =
    `${nodes.length} classes · ${links.length} edges`;
}
document.getElementById('onlyRisk').addEventListener('change', apply);
document.getElementById('onlyLockRisk').addEventListener('change', apply);
document.getElementById('hlRisk').addEventListener('change', () => Graph.nodeColor(nodeColor));
document.getElementById('groupPkg').addEventListener('change', e => {
  groupByPkg = e.target.checked;
  Graph.nodeColor(nodeColor);
  applyLayoutForces();
  Graph.d3AlphaDecay(0.05).d3ReheatSimulation();
  updateLegend();
});

// ---- search autocomplete -----------------------------------------
const searchEl  = document.getElementById('search');
const suggestEl = document.getElementById('search-suggestions');
let activeIdx   = -1;

function selectNode(node) {
  searchEl.value = node.label;
  suggestEl.style.display = 'none';
  activeIdx = -1;
  selectedNode = node;
  Graph.nodeColor(nodeColor).nodeVal(nodeVal);
  showNodeDetail(node);
  flyTo(node);
}

function positionSuggestions() {
  const r = searchEl.getBoundingClientRect();
  suggestEl.style.top   = (r.bottom + 2) + 'px';
  suggestEl.style.left  = r.left + 'px';
  suggestEl.style.width = r.width + 'px';
}

function renderSuggestions(hits) {
  if (!hits.length) { suggestEl.style.display = 'none'; return; }
  suggestEl.innerHTML = hits.map((n, i) =>
    `<div data-i="${i}">
       ${n.label}
       <span class="pkg-hint">${pkgOf(n)}</span>
     </div>`).join('');
  positionSuggestions();
  suggestEl.style.display = 'block';
  activeIdx = -1;
  suggestEl.querySelectorAll('div').forEach((el, i) => {
    el.addEventListener('mousedown', e => { e.preventDefault(); selectNode(hits[i]); });
  });
}

searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toLowerCase();
  if (q.length < 2) { suggestEl.style.display = 'none'; return; }
  const hits = DATA.nodes.filter(n => n.label.toLowerCase().includes(q)).slice(0, 8);
  renderSuggestions(hits);
});

searchEl.addEventListener('keydown', e => {
  const items = suggestEl.querySelectorAll('div');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeIdx = Math.min(activeIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeIdx = Math.max(activeIdx - 1, -1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (activeIdx >= 0) {
      const q = searchEl.value.trim().toLowerCase();
      const hits = DATA.nodes.filter(n => n.label.toLowerCase().includes(q)).slice(0, 8);
      if (hits[activeIdx]) selectNode(hits[activeIdx]);
    } else {
      const q = searchEl.value.trim().toLowerCase();
      const hit = DATA.nodes.find(n => n.label.toLowerCase().includes(q));
      if (hit) selectNode(hit);
    }
  } else if (e.key === 'Escape') {
    suggestEl.style.display = 'none';
  }
});

document.addEventListener('click', e => {
  if (!searchEl.contains(e.target) && !suggestEl.contains(e.target))
    suggestEl.style.display = 'none';
});

// ---- node detail -------------------------------------------------
function showNodeDetail(node) {
  const ext = node.external && node.externalCalls.length ? node.externalCalls.join(', ') : '—';
  document.getElementById('node-detail').innerHTML = `
    <div class="class-name">${node.label}</div>
    <table>
      <tr><td>Package</td><td><span class="dot" style="background:${pkgColor(pkgOf(node))}"></span>${pkgOf(node)}</td></tr>
      <tr><td>Project</td><td>${node.project||'—'}</td></tr>
      <tr><td>Methods</td><td>${node.methods}</td></tr>
      <tr><td>@Transactional</td><td>${node.transactional ? '✓' : '—'}</td></tr>
      <tr><td>External</td><td>${ext}</td></tr>
      <tr><td>Cyclic</td><td>${node.cyclic ? '✓' : '—'}</td></tr>
      <tr><td>In risk</td><td>${node.inRisk ? '⚠ yes' : '—'}</td></tr>
      <tr><td>Lock risk</td><td>${node.inLockRisk ? '⚠ yes' : '—'}</td></tr>
    </table>`;
  document.getElementById('node-info').style.display = 'block';
}
document.getElementById('node-clear').addEventListener('click', () => {
  document.getElementById('node-info').style.display = 'none';
  selectedNode = null;
  Graph.nodeColor(nodeColor).nodeVal(nodeVal);
});

// ---- legend ------------------------------------------------------
function updateLegend() {
  const legend = document.getElementById('legend');
  if (groupByPkg) {
    legend.innerHTML = `<b>Color = package</b>
      <div class="muted">${allPkgs.length} packages · classes clustered spatially · red = risk</div>`;
  } else if (DATA.multiProject) {
    legend.innerHTML = '<b>Color = project</b><br><span class="muted">red = risk / external</span>';
  } else {
    legend.innerHTML = `<b>Color = role</b>
       <label><span class="dot" style="background:#ff8c00"></span>tx + external</label>
       <label><span class="dot" style="background:#f0dc50"></span>@Transactional</label>
       <label><span class="dot" style="background:#f06464"></span>external</label>
       <label><span class="dot" style="background:#9ab4dc"></span>plain</label>`;
  }
}
updateLegend();

apply();

// ---- draggable panel ---------------------------------------------
(function () {
  const panel = document.getElementById('panel');
  const handle = panel.querySelector('h1');
  let dragging = false, ox = 0, oy = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    ox = e.clientX - panel.offsetLeft;
    oy = e.clientY - panel.offsetTop;
    handle.style.cursor = 'grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const x = Math.max(0, Math.min(e.clientX - ox, window.innerWidth  - panel.offsetWidth));
    const y = Math.max(0, Math.min(e.clientY - oy, window.innerHeight - panel.offsetHeight));
    panel.style.left = x + 'px';
    panel.style.top  = y + 'px';
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    handle.style.cursor = 'grab';
  });
})();
</script>
</body>
</html>
