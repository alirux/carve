<!DOCTYPE html>
{{META}}
<html lang="en">
<head>
<meta charset="UTF-8">
<title>carve — package graph</title>
<style>
  html,body { margin:0; height:100%; background:#0d1117; color:#e6edf3;
              font-family:-apple-system,Helvetica,Arial,sans-serif; overflow:hidden; }
  #graph { position:absolute; inset:0; }
  #panel { position:absolute; top:12px; left:12px; z-index:10; background:rgba(22,27,34,.92);
           border:1px solid #484f58; border-radius:8px; padding:12px 14px; max-width:280px;
           font-size:13px; display:flex; flex-direction:column;
           max-height:calc(100vh - 48px); overflow-y:auto;
           backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
           box-shadow:0 8px 32px rgba(0,0,0,.55); }
  #panel h1 { font-size:14px; margin:0 0 8px; cursor:grab; user-select:none; flex-shrink:0; }
  #panel h1:active { cursor:grabbing; }
  #panel label { display:block; margin:3px 0; cursor:pointer; }
  #panel .sec { margin-top:10px; border-top:1px solid #30363d; padding-top:8px; flex-shrink:0; }
  #projects { overflow-y:auto; overflow-x:hidden; max-height:32vh; padding-right:4px;
              scrollbar-width:thin; scrollbar-color:#484f58 transparent; }
  #projects::-webkit-scrollbar { width:6px; }
  #projects::-webkit-scrollbar-thumb { background:#484f58; border-radius:3px; }
  #search { width:100%; box-sizing:border-box; background:#0d1117; color:#e6edf3;
            border:1px solid #30363d; border-radius:5px; padding:5px; margin-top:4px; }
  #search-suggestions { position:fixed; z-index:100; background:#161b22; border:1px solid #484f58;
            border-radius:6px; box-shadow:0 6px 20px rgba(0,0,0,.6); display:none; }
  #search-suggestions div { padding:6px 10px; cursor:pointer; font-size:12px;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #search-suggestions div:hover, #search-suggestions div.active { background:#2d333b; }
  #search-suggestions .pkg-hint { color:#8b949e; font-size:11px; }
  .dot { display:inline-block; width:11px; height:11px; border-radius:50%;
         margin-right:6px; vertical-align:middle; flex-shrink:0; }
  .muted { color:#8b949e; font-size:11px; }
  .help { display:inline; }
  .help > summary { display:inline-block; width:13px; height:13px; line-height:13px;
           text-align:center; border-radius:50%; border:1px solid #6e7681; color:#8b949e;
           font-size:9px; font-weight:bold; cursor:help; margin-left:5px;
           vertical-align:middle; list-style:none; }
  .help > summary::-webkit-details-marker { display:none; }
  .help > summary:hover { border-color:#adbac7; color:#adbac7; }
  .help[open] > summary { border-color:#adbac7; color:#adbac7; }
  .help .help-body { margin:6px 0 2px; padding:8px 10px; background:#0d1117;
           border:1px solid #30363d; border-radius:6px; color:#c9d1d9; font-size:11px;
           font-weight:normal; line-height:1.5; }
  .help .help-body b { color:#e6edf3; }
  .help .help-body code { background:#161b22; padding:0 3px; border-radius:3px;
           font-size:10px; color:#adbac7; word-break:break-all; }
  #node-detail table { width:100%; border-collapse:collapse; margin-top:6px; font-size:12px; }
  #node-detail td { padding:2px 0; vertical-align:top; }
  #node-detail td:first-child { color:#8b949e; width:78px; }
  #node-detail td:last-child { word-break:break-all; }
  #node-detail .pkg-name { font-weight:bold; word-break:break-all; margin-bottom:6px;
                           font-size:12px; line-height:1.4; }
  #loading { position:fixed; inset:0; z-index:999; background:#0d1117;
             display:flex; flex-direction:column; align-items:center; justify-content:center;
             gap:16px; pointer-events:none; transition:opacity .4s; }
  #loading.hidden { opacity:0; }
  .spinner { width:36px; height:36px; border:3px solid #30363d;
             border-top-color:#58a6ff; border-radius:50%;
             animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loading-msg { color:#8b949e; font-size:13px; }
  #report-footer { position:fixed; left:0; right:0; bottom:0; z-index:5;
             background:rgba(13,17,23,.8); color:#6e7681; font-size:10px; line-height:1.6;
             padding:3px 10px; pointer-events:none;
             backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); }
  #report-footer a { color:#6e7681; pointer-events:auto; }
  #report-footer .disclaimer { cursor:help; text-decoration:underline dotted; pointer-events:auto; }
  #report-title { position:fixed; top:10px; left:0; right:0; z-index:4; text-align:center;
             color:#6e7681; font-size:11px; letter-spacing:.14em; text-transform:uppercase;
             pointer-events:none; user-select:none; }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <div id="loading-msg">Building graph…</div>
</div>
<div id="graph"></div>
<div id="report-title"></div>
<div id="panel">
  <h1 title="Drag to move">⠿ Package graph</h1>
  <div id="stats" class="muted"></div>
  <div id="lombok-note" style="display:none;color:#d29922;font-size:12px;margin-top:4px"></div>
  <div class="sec" id="projects"></div>
  <div class="sec">
    <label><input type="checkbox" id="onlyRisk"> Only risk packages</label>
    <label><input type="checkbox" id="onlyLockRisk"> Only lock risk packages</label>
    <label><input type="checkbox" id="hlRisk" checked> Highlight risks (red)</label>
    <label><input type="checkbox" id="hideCha"> Hide inferred (CHA) edges</label>
  </div>
  <div class="sec" id="hotspot-controls">
    <label><input type="checkbox" id="onlyHotspot"> Only modernisation hotspots</label>
    <label><input type="checkbox" id="hlHotspot" checked> Highlight hotspots</label>
  </div>
  <div class="sec">
    <label><input type="checkbox" id="groupProj"> Group by project</label>
  </div>
  <div class="sec" style="position:relative">
    <input id="search" placeholder="Search package…" autocomplete="off">
    <div id="search-suggestions"></div>
  </div>
  <div class="sec legend" id="legend"></div>
  <div class="sec" id="node-info" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <b>Selected package</b>
      <span id="node-clear" style="cursor:pointer;color:#8b949e;font-size:15px"
            title="Clear selection">✕</span>
    </div>
    <div id="node-detail"></div>
  </div>
</div>
<div id="report-footer"></div>
<script src="https://unpkg.com/3d-force-graph"></script>
<script>
const DATA = {{DATA}};
if (DATA.meta) {
  const m = DATA.meta;
  document.getElementById('report-title').textContent = `${m.generatedBy} v${m.version}`;
  document.getElementById('report-footer').innerHTML =
    `Generated by <a href="${m.toolRepository}" target="_blank" rel="noopener">${m.generatedBy}</a> `
    + `v${m.version} on ${m.generatedOn} &middot; `
    + `${m.generatedBy} is ${m.toolCopyright}, <a href="${m.toolLicenseUrl}" target="_blank" rel="noopener">${m.toolLicense}</a> &middot; `
    + `<span class="disclaimer" title="${m.disclaimer.replace(/"/g, '&quot;')}">No warranty — hover for details</span>`;
}
const PALETTE = ['#56b4e9','#e69f00','#009e73','#cc79a7','#0072b2','#f0e442','#d55e00','#999999'];
const projColor = {};
[...new Set(DATA.nodes.map(n => n.project))].sort()
  .forEach((p, i) => projColor[p] = PALETTE[i % PALETTE.length]);

function roleColor(n) {
  if (n.inRisk && n.transactional) return '#e69f00';
  if (n.inRisk)        return '#f06464';
  if (n.inLockRisk)    return '#cc79a7';
  if (n.transactional) return '#f0dc50';
  if (n.external)      return '#ff8c00';
  if (n.cyclic)        return '#56b4e9';
  return '#9ab4dc';
}

// Modernisation hotspot archetypes (see analysis.json → packageCoupling.hotspots)
const ARCHETYPES = {
  unstableHubs:         { color: '#a371f7', label: 'unstable hub' },
  extractionCandidates: { color: '#3fb950', label: 'extraction candidate' },
  stableCores:          { color: '#39c5cf', label: 'stable core' }
};
const HAS_HOTSPOTS = DATA.nodes.some(n => n.archetype);
function archColor(n) {
  const a = ARCHETYPES[n.archetype];
  return a ? a.color : null;
}

let selectedNode = null;
let dblTimer = null;

function nodeColor(n) {
  if (n === selectedNode) return '#ffffff';
  if (document.getElementById('hlHotspot').checked && n.archetype) return archColor(n);
  if (document.getElementById('hlRisk').checked && (n.inRisk || n.inLockRisk)) return '#ff3b3b';
  return DATA.multiProject ? (projColor[n.project] || '#9ab4dc') : roleColor(n);
}
function nodeVal(n) {
  const base = 2 + Math.min(n.classes, 60) * 0.6;
  return n === selectedNode ? base * 2.5 : base;
}
function flyTo(node) {
  const d = 150;
  const r = 1 + (node.x*node.x + node.y*node.y + node.z*node.z) ** 0.5;
  Graph.cameraPosition(
    { x: node.x*(1+d/r), y: node.y*(1+d/r), z: node.z*(1+d/r) }, node, 800);
}

// True when every underlying call behind this link was inferred by class
// hierarchy analysis, so the coupling may not exist at runtime.
function chaOnly(l) { return l.weight > 0 && l.chaWeight === l.weight; }

const elGraph = document.getElementById('graph');
const Graph = ForceGraph3D()(elGraph)
  .backgroundColor('#0d1117')
  .nodeLabel(n => `<div style="background:#161b22;padding:4px 8px;border-radius:4px;border:1px solid #30363d">
      <b>${n.label}</b><br>
      <span style="color:#8b949e">${n.id}${DATA.multiProject?' · '+(n.project||'—'):''}</span><br>
      ${n.classes} class${n.classes!==1?'es':''}${n.transactional?' · @Transactional':''}${n.external?' · external':''}${n.cyclic?' · cyclic':''}${n.inRisk?' · risk':''}${n.inLockRisk?' · lock risk':''}${n.archetype?`<br><span style="color:${archColor(n)}">◆ ${ARCHETYPES[n.archetype].label} · score ${n.score.toFixed(2)}</span>`:''}</div>`)
  .nodeColor(nodeColor)
  .nodeRelSize(4)
  .nodeVal(nodeVal)
  .nodeOpacity(0.88)
  // Couplings resting entirely on class hierarchy analysis get their own hue:
  // they are inferred over-approximations, not call sites in the source. Colour
  // rather than opacity, because .linkOpacity() below flattens any alpha here.
  .linkColor(l => chaOnly(l) ? '#c98a2e' : 'rgba(188,198,212,0.40)')
  .linkOpacity(0.4)
  .linkWidth(l => Math.min(0.8 + l.weight * 0.15, 6))
  .linkDirectionalArrowLength(4)
  .linkDirectionalArrowRelPos(1)
  .linkDirectionalArrowColor(() => 'rgba(210,218,228,0.6)')
  .linkDirectionalParticles(l => Math.min(Math.ceil(l.weight / 3), 4))
  .linkDirectionalParticleWidth(1.8)
  .linkDirectionalParticleColor(l => chaOnly(l) ? '#c98a2e' : '#d7dee8')
  .linkDirectionalParticleSpeed(0.005)
  .warmupTicks(100)
  .cooldownTicks(150)
  .onEngineStop(() => {
    const el = document.getElementById('loading');
    if (el) { el.classList.add('hidden'); setTimeout(() => el.remove(), 450); }
  })
  .onNodeClick(node => {
    selectedNode = node;
    Graph.nodeColor(nodeColor).nodeVal(nodeVal);
    showNodeDetail(node);
    if (dblTimer !== null) {
      clearTimeout(dblTimer);
      dblTimer = null;
      flyTo(node);
    } else {
      dblTimer = setTimeout(() => { dblTimer = null; }, 280);
    }
  });

// Keep the library's built-in "left-click: rotate…" hint clear of our footer bar.
function positionNavInfoAboveFooter() {
  const nav = elGraph.querySelector('.scene-nav-info');
  const footer = document.getElementById('report-footer');
  if (nav && footer) nav.style.bottom = (footer.getBoundingClientRect().height + 6) + 'px';
}
positionNavInfoAboveFooter();
window.addEventListener('resize', positionNavInfoAboveFooter);

// ---- spread nodes more: override default charge repulsion -----------
Graph.d3Force('charge').strength(-300);

// ---- project clustering layout -----------------------------------
const allProjs = [...new Set(DATA.nodes.map(n => n.project))].sort();
const PROJ_FOCI = (() => {
  const N = allProjs.length;
  if (N <= 1) return {};
  const R = 80 * Math.sqrt(N);
  const pos = {};
  allProjs.forEach((p, i) => {
    const y = 1 - (i + 0.5) / N * 2;
    const ring = Math.sqrt(Math.max(0, 1 - y * y));
    const th = Math.PI * (1 + Math.sqrt(5)) * i;
    pos[p] = { x: R * Math.cos(th) * ring, y: R * y, z: R * Math.sin(th) * ring };
  });
  const projW = {};
  DATA.links.forEach(l => {
    const si = typeof l.source==='object' ? l.source.id : l.source;
    const ti = typeof l.target==='object' ? l.target.id : l.target;
    const sn = DATA.nodes.find(n => n.id === si);
    const tn = DATA.nodes.find(n => n.id === ti);
    if (!sn || !tn || sn.project === tn.project) return;
    const key = sn.project < tn.project ? sn.project+'|'+tn.project : tn.project+'|'+sn.project;
    projW[key] = (projW[key] || 0) + (l.weight || 1);
  });
  const maxW = Math.max(1, ...Object.values(projW).concat([0]));
  const REPULSE = R * R * 1.2, ITERS = 150;
  for (let iter = 0; iter < ITERS; iter++) {
    const alpha = Math.pow(1 - iter / ITERS, 1.5);
    const f = {};
    allProjs.forEach(p => { f[p] = {x:0,y:0,z:0}; });
    for (let i = 0; i < N; i++) for (let j = i+1; j < N; j++) {
      const a = allProjs[i], b = allProjs[j];
      const dx=pos[b].x-pos[a].x, dy=pos[b].y-pos[a].y, dz=pos[b].z-pos[a].z;
      const k=REPULSE/(dx*dx+dy*dy+dz*dz+1);
      f[a].x-=k*dx; f[a].y-=k*dy; f[a].z-=k*dz;
      f[b].x+=k*dx; f[b].y+=k*dy; f[b].z+=k*dz;
    }
    Object.entries(projW).forEach(([key, w]) => {
      const sep=key.indexOf('|');
      const a=key.substring(0,sep), b=key.substring(sep+1);
      const dx=pos[b].x-pos[a].x, dy=pos[b].y-pos[a].y, dz=pos[b].z-pos[a].z;
      const d=Math.sqrt(dx*dx+dy*dy+dz*dz)+1, k=(w/maxW)*R*0.08;
      f[a].x+=k*dx/d; f[a].y+=k*dy/d; f[a].z+=k*dz/d;
      f[b].x-=k*dx/d; f[b].y-=k*dy/d; f[b].z-=k*dz/d;
    });
    allProjs.forEach(p => { pos[p].x+=f[p].x*alpha; pos[p].y+=f[p].y*alpha; pos[p].z+=f[p].z*alpha; });
  }
  const maxD=Math.sqrt(Math.max(1,...allProjs.map(p=>pos[p].x**2+pos[p].y**2+pos[p].z**2)));
  allProjs.forEach(p=>{pos[p].x=pos[p].x/maxD*R;pos[p].y=pos[p].y/maxD*R;pos[p].z=pos[p].z/maxD*R;});
  return pos;
})();

let groupProject = false;
function projClusterForce() {
  let nodes = [];
  function force(alpha) {
    if (!groupProject) return;
    const k = alpha * 0.55;
    for (const n of nodes) {
      const f = PROJ_FOCI[n.project];
      if (!f) continue;
      n.vx += (f.x - n.x) * k;
      n.vy += (f.y - n.y) * k;
      n.vz += (f.z - n.z) * k;
    }
  }
  force.initialize = _ => { nodes = _; };
  return force;
}
Graph.d3Force('projCluster', projClusterForce());

const linkForce   = Graph.d3Force('link');
const chargeForce = Graph.d3Force('charge');
const defLinkStr  = linkForce.strength();
function applyLayoutForces() {
  if (groupProject) {
    linkForce.strength(0.04);
    chargeForce.strength(-18);
  } else {
    linkForce.strength(defLinkStr);
    chargeForce.strength(-300);
  }
}

// ---- filtering ---------------------------------------------------
const projects = [...new Set(DATA.nodes.map(n => n.project))].sort();
const active = new Set(projects);
const projDiv = document.getElementById('projects');
if (DATA.multiProject) {
  projDiv.innerHTML = '<b>Projects</b>';
  const projCheckboxes = [];
  const allId = 'p_all';
  projDiv.insertAdjacentHTML('beforeend',
    `<label style="display:flex;align-items:center;gap:4px;font-weight:bold">
       <input type="checkbox" id="${allId}" checked>All / none
     </label>`);
  const allCb = document.getElementById(allId);
  allCb.addEventListener('change', e => {
    active.clear();
    projCheckboxes.forEach(cb => {
      cb.checked = e.target.checked;
      if (e.target.checked) active.add(cb.dataset.project);
    });
    apply();
  });
  projects.forEach(p => {
    const id = 'p_' + p;
    const color = projColor[p] || '#9ab4dc';
    projDiv.insertAdjacentHTML('beforeend',
      `<label style="display:flex;align-items:center;gap:4px">
         <input type="checkbox" id="${id}" checked>
         <span class="dot" style="background:${color}"></span>${p||'(none)'}
       </label>`);
    const cb = document.getElementById(id);
    cb.dataset.project = p;
    projCheckboxes.push(cb);
    cb.addEventListener('change', e => {
      if (e.target.checked) active.add(p); else active.delete(p);
      allCb.checked = projCheckboxes.every(c => c.checked);
      apply();
    });
  });
} else {
  projDiv.style.display = 'none';
}

function apply() {
  const onlyRisk     = document.getElementById('onlyRisk').checked;
  const onlyLockRisk = document.getElementById('onlyLockRisk').checked;
  const hideCha      = document.getElementById('hideCha').checked;
  const onlyHotspot  = document.getElementById('onlyHotspot').checked;
  const nodes = DATA.nodes.filter(n =>
    active.has(n.project) &&
    (!onlyRisk     || n.inRisk) &&
    (!onlyLockRisk || n.inLockRisk) &&
    (!onlyHotspot  || n.archetype));
  const ids = new Set(nodes.map(n => n.id));
  const links = DATA.links.filter(l =>
    ids.has(typeof l.source==='object'?l.source.id:l.source) &&
    ids.has(typeof l.target==='object'?l.target.id:l.target) &&
    (!hideCha || !chaOnly(l)));
  Graph.graphData({ nodes, links });
  const chaCount = links.filter(chaOnly).length;
  document.getElementById('stats').textContent =
    `${nodes.length} packages · ${links.length} edges`
    + (chaCount ? ` · ${chaCount} inferred` : '');
}
document.getElementById('onlyRisk').addEventListener('change', apply);
document.getElementById('onlyLockRisk').addEventListener('change', apply);
document.getElementById('hideCha').addEventListener('change', apply);
document.getElementById('onlyHotspot').addEventListener('change', apply);
document.getElementById('hlRisk').addEventListener('change', () => Graph.nodeColor(nodeColor));
document.getElementById('hlHotspot').addEventListener('change', () => Graph.nodeColor(nodeColor));
document.getElementById('groupProj').addEventListener('change', e => {
  groupProject = e.target.checked;
  Graph.nodeColor(nodeColor);
  applyLayoutForces();
  Graph.d3AlphaDecay(0.05).d3ReheatSimulation();
  updateLegend();
});

// ---- search autocomplete -----------------------------------------
const searchEl  = document.getElementById('search');
const suggestEl = document.getElementById('search-suggestions');
let activeIdx   = -1;

function selectNode(node) {
  searchEl.value = node.id;
  suggestEl.style.display = 'none';
  activeIdx = -1;
  selectedNode = node;
  Graph.nodeColor(nodeColor).nodeVal(nodeVal);
  showNodeDetail(node);
  flyTo(node);
}

function positionSuggestions() {
  const r = searchEl.getBoundingClientRect();
  suggestEl.style.top   = (r.bottom + 2) + 'px';
  suggestEl.style.left  = r.left + 'px';
  suggestEl.style.width = r.width + 'px';
}

function renderSuggestions(hits) {
  if (!hits.length) { suggestEl.style.display = 'none'; return; }
  suggestEl.innerHTML = hits.map((n, i) =>
    `<div data-i="${i}">
       ${n.label}
       <span class="pkg-hint">${n.id}</span>
     </div>`).join('');
  positionSuggestions();
  suggestEl.style.display = 'block';
  activeIdx = -1;
  suggestEl.querySelectorAll('div').forEach((el, i) => {
    el.addEventListener('mousedown', e => { e.preventDefault(); selectNode(hits[i]); });
  });
}

function getHits(q) {
  return DATA.nodes.filter(n =>
    n.id.toLowerCase().includes(q) || n.label.toLowerCase().includes(q)).slice(0, 8);
}

searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toLowerCase();
  if (q.length < 2) { suggestEl.style.display = 'none'; return; }
  renderSuggestions(getHits(q));
});

searchEl.addEventListener('keydown', e => {
  const items = suggestEl.querySelectorAll('div');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeIdx = Math.min(activeIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeIdx = Math.max(activeIdx - 1, -1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const q = searchEl.value.trim().toLowerCase();
    const hits = getHits(q);
    const target = activeIdx >= 0 ? hits[activeIdx] : hits[0];
    if (target) selectNode(target);
  } else if (e.key === 'Escape') {
    suggestEl.style.display = 'none';
  }
});

document.addEventListener('click', e => {
  if (!searchEl.contains(e.target) && !suggestEl.contains(e.target))
    suggestEl.style.display = 'none';
});

// ---- node detail -------------------------------------------------
function showNodeDetail(node) {
  document.getElementById('node-detail').innerHTML = `
    <div class="pkg-name">${node.id}</div>
    <table>
      <tr><td>Project</td><td>${node.project||'—'}</td></tr>
      <tr><td>Classes</td><td>${node.classes}</td></tr>
      <tr><td>@Transactional</td><td>${node.transactional ? '✓' : '—'}</td></tr>
      <tr><td>External</td><td>${node.external ? '✓' : '—'}</td></tr>
      <tr><td>Cyclic</td><td>${node.cyclic ? '✓' : '—'}</td></tr>
      <tr><td>In risk</td><td>${node.inRisk ? '⚠ yes' : '—'}</td></tr>
      <tr><td>Lock risk</td><td>${node.inLockRisk ? '⚠ yes' : '—'}</td></tr>
      <tr><td>Hotspot</td><td>${node.archetype
        ? `<span style="color:${archColor(node)}">◆ ${ARCHETYPES[node.archetype].label}</span> · score ${node.score.toFixed(2)}`
        : '—'}</td></tr>
    </table>`;
  document.getElementById('node-info').style.display = 'block';
}
document.getElementById('node-clear').addEventListener('click', () => {
  document.getElementById('node-info').style.display = 'none';
  selectedNode = null;
  Graph.nodeColor(nodeColor).nodeVal(nodeVal);
});

// ---- legend ------------------------------------------------------
function hotspotLegend() {
  if (!HAS_HOTSPOTS) return '';
  const rows = Object.values(ARCHETYPES).map(a =>
    `<label><span class="dot" style="background:${a.color}"></span>${a.label}</label>`).join('');
  return `<div style="margin-top:6px"><b>◆ Modernisation hotspots</b>${rows}</div>`;
}
// Link colours are independent of the node colouring mode, so the legend entry
// is appended in every mode.
function linkLegend() {
  return `<div style="margin-top:6px"><b>Edges</b><details class="help"><summary title="What are inferred edges?">?</summary><div class="help-body">
       <b>Class hierarchy analysis (CHA)</b> resolves a call made on an interface
       or abstract type to the implementations visible in the analysed source.
       It is what lets the tool see through a DAO interface into the class that
       actually touches the database.<br><br>
       It over-approximates on purpose: a call site is linked to <b>every</b>
       implementation found, even ones it can never reach at runtime — and with
       several <code>--source</code> roots, even implementations in projects that
       share no build dependency.<br><br>
       An edge is amber only when <b>every</b> underlying call was inferred this
       way; one real call site keeps it grey. Reading the graph as a dependency
       map (against <code>pom.xml</code> / <code>build.gradle</code>), leave the
       amber ones out — or hide them with the filter above.</div></details>
     <label><span class="dot" style="background:rgba(188,198,212,0.7)"></span>direct call site</label>
     <label><span class="dot" style="background:#c98a2e"></span>inferred by class hierarchy analysis</label>
     <div class="muted">inferred edges may not exist at runtime</div></div>`;
}

function updateLegend() {
  const legend = document.getElementById('legend');
  if (groupProject) {
    legend.innerHTML = `<b>Color = project</b>
      <div class="muted">${allProjs.length} projects · packages clustered spatially · red = risk</div>`;
  } else if (DATA.multiProject) {
    legend.innerHTML = '<b>Color = project</b><br><span class="muted">red = risk / lock risk</span>';
  } else {
    legend.innerHTML = `<b>Color = role</b>
       <label><span class="dot" style="background:#e69f00"></span>risk + tx</label>
       <label><span class="dot" style="background:#f06464"></span>in risk</label>
       <label><span class="dot" style="background:#cc79a7"></span>lock risk</label>
       <label><span class="dot" style="background:#f0dc50"></span>@Transactional</label>
       <label><span class="dot" style="background:#ff8c00"></span>external</label>
       <label><span class="dot" style="background:#56b4e9"></span>cyclic</label>
       <label><span class="dot" style="background:#9ab4dc"></span>plain</label>`;
  }
  legend.innerHTML += hotspotLegend();
  legend.innerHTML += linkLegend();
}
if (!HAS_HOTSPOTS) document.getElementById('hotspot-controls').style.display = 'none';
updateLegend();

if (DATA.lombokAnnotatedTypes > 0) {
  const ln = document.getElementById('lombok-note');
  ln.style.display = 'block';
  ln.textContent = `⚠ Lombok on ${DATA.lombokAnnotatedTypes} type(s): coupling via generated `
    + `accessors / @Builder chains may be incomplete.`;
}

apply();

// ---- draggable panel ---------------------------------------------
(function () {
  const panel = document.getElementById('panel');
  const handle = panel.querySelector('h1');
  let dragging = false, ox = 0, oy = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    ox = e.clientX - panel.offsetLeft;
    oy = e.clientY - panel.offsetTop;
    handle.style.cursor = 'grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const x = Math.max(0, Math.min(e.clientX - ox, window.innerWidth  - panel.offsetWidth));
    const y = Math.max(0, Math.min(e.clientY - oy, window.innerHeight - panel.offsetHeight));
    panel.style.left = x + 'px';
    panel.style.top  = y + 'px';
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    handle.style.cursor = 'grab';
  });
})();
</script>
</body>
</html>
